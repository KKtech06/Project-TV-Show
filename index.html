<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Show Project | Karim (KKtech06)</title>
  <link href="style.css" rel="stylesheet" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
</head>

<body>

  <!-- SHOWS VIEW -->
  <div id="shows-view">
    <input id="show-search" placeholder="Search shows..." />
    <div id="shows-container"></div>
  </div>

  <!-- EPISODES VIEW -->
  <div id="episodes-view" style="display:none">
    <a id="back-link" href="#">← Back to Shows</a>
    <input id="search" placeholder="Search episodes..." />
    <select id="episode-selector"></select>
    <p id="count"></p>
    <p id="message"></p>
    <div id="episode-container"></div>
  </div>

  <div class="tvMaze">
    <p>
      Data originally sourced from
      <a href="https://www.tvmaze.com" target="_blank" rel="noopener noreferrer">TVMaze.com</a>.
      Visit their site for more information.
    </p>
  </div>

  <script src="script.js"></script>
</body>

</html>
